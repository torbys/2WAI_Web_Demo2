<script>
	/*max滑块的更改*/
	document.getElementById('chunk-size').addEventListener('input', function(e) {
	   var value = e.target.value;
	   var numberBoxContainer = document.querySelector('.number-box-container');
	   
	   // 确保.number-box-container是可见的
	   numberBoxContainer.style.display = 'block'; 
	   
	   var sliderWidth = e.target.offsetWidth;
	   var numberBoxLeft = (value / e.target.max) * (sliderWidth - 100) + 'px';
	   
	   numberBoxContainer.style.left = numberBoxLeft;
	   
	   // 清除之前的定时器
	   if (numberBoxContainer.timeoutId) {
	     clearTimeout(numberBoxContainer.timeoutId);
	   }
	   
	   // 设置一个短暂的延迟，然后隐藏.number-box-container
	   numberBoxContainer.timeoutId = setTimeout(function() {
	     numberBoxContainer.style.display = 'none';
	   }, 500); // 1000毫秒后隐藏，可以根据需要调整这个时间
	});

</script>

	function changeImage() {

		voiceFlag=!voiceFlag;

	    var newSrc =voiceFlag? './icon/voice.png' : './icon/left.png'; // 根据 voiceFlag 的值选择图片
	
	    // 添加过渡效果
	    image.classList.add('changing');
	
	    // 移除过渡效果类，这将在 CSS 中触发过渡
	    setTimeout(function() {
			// 设置图片新源
			image.src = newSrc;
	        image.classList.remove('changing');
	    }, 300); // 300毫秒后移除，与 CSS 中的过渡时间相匹配
		
		var message = document.getElementById('message');
		var recordGroup1 = document.getElementById('recordGroup1');
		var recordGroup2 = document.getElementById('recordGroup2');
		var voiceImage = document.getElementById('voice-image');
	
		// 切换显示状态
		if (message.classList.contains('hidden')) {
		    message.classList.remove('hidden');
		    recordGroup1.classList.add('hidden');
			recordGroup2.classList.add('hidden');
		} else {
		    message.classList.add('hidden');
		    recordGroup1.classList.remove('hidden');
		}
		
		 // 获取 #record_wrapper 元素
		var recordWrapper = document.getElementById('record_wrapper');
		const recordTime = document.getElementById('recordTime');
		// 计时器变量
		let timer = null;
		let timeValue = 0;
		
		// 更新时间的函数
		function updateTime() {
		  timeValue += 0.01;
		  recordTime.textContent = timeValue.toFixed(2); // 保留两位小数
		}
		
		// 计时器开始的函数
		function startTimer() {
		  timer = setInterval(updateTime, 1000); // 每秒更新时间
		}
		
		// 计时器停止并重置的函数
		function stopTimer() {
		  clearInterval(timer);
		  timeValue = 0;
		  recordTime.textContent = '0.00';
		}
		
		// 为 #record_wrapper 添加点击事件监听器
		recordWrapper.addEventListener('click', function() {
		    // 获取 #recordGroup1 和 #recordGroup2 元素
		    var recordGroup1 = document.getElementById('recordGroup1');
		    var recordGroup2 = document.getElementById('recordGroup2');

		    // 给 #recordGroup1 添加 hidden 类，使其隐藏
		    recordGroup1.classList.add('hidden');

		    // 移除 #recordGroup2 的 hidden 类，使其显示
		    recordGroup2.classList.remove('hidden');
			
			if (!recordGroup2.classList.contains('hidden')) {
			    startTimer();
			  } else {
			    // 如果recordGroup2是hidden，则重置时间
			    stopTimer();
			  }
		});
		
		// 监听recordGroup2的显示状态变化，以重置时间
		recordGroup2.addEventListener('click', function() {
			
			recordGroup2.classList.add('hidden');
			message.classList.remove('hidden');
			
			var newSrc =!voiceFlag? './icon/voice.png' : './icon/left.png'; // 根据 voiceFlag 的值选择图片
			image.classList.add('changing');
			
			// 移除过渡效果类，这将在 CSS 中触发过渡
			setTimeout(function() {
				// 设置图片新源
				image.src = newSrc;
			    image.classList.remove('changing');
			}, 300); // 300毫秒后移除，与 CSS 中的过渡时间相匹配
			
		    if (recordGroup2.classList.contains('hidden')) {
		      stopTimer();
		    } else {
		      startTimer();
		    }
		});
		
		
	}

	  function addThumbnailClickEvents(swiperInstance, selector) {
	  	
	    var thumbnails = document.querySelectorAll(selector + ' .swiper-slide');
	    thumbnails.forEach(function(slide, index) {
	  	// 添加鼠标悬停事件
	  	slide.addEventListener('mouseenter', function(e) {
	  	  e.stopPropagation();
	  	  // 鼠标悬停时改变鼠标样式
	  	  e.target.style.cursor = 'pointer';
	  	});
	  	
	  	// 添加鼠标离开事件
	  	slide.addEventListener('mouseleave', function(e) {
	  	  e.stopPropagation();
	  	  // 鼠标离开时恢复鼠标样式
	  	  e.target.style.cursor = 'default';
	  	});  
	  	  
	      slide.addEventListener('click', function(e) {
	        // 阻止事件冒泡
	        e.stopPropagation();
	        // 跳转到对应的幻灯片
	        swiperInstance.slideTo(index);
	      });
	    });
	  }
	  
	  // 调用函数为每个 Swiper 实例添加点击事件

<script>
    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;  // 添加录音状态标志

	//record_wrapper
	//stop_wrapper
	
    $('#record_wrapper').click(function() {
        if (isRecording) return;
        
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };
                
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    
                    $('#audio-preview').show();
                    $('#audio-player').attr('src', audioUrl);
                    $('#file-name').text('Recorded Audio');
                    $('#delete-audio').show();
                    
                    isRecording = false;
                    // 恢复按钮文本
                    // $(this).html('<i class="fas fa-microphone"></i> Start Recording');
                };
                
                mediaRecorder.start();
                audioChunks = [];
                isRecording = true;
                
                // 更新按钮状态和文本
                $(this).prop('disabled', true);
                // $(this).html('<i class="fas fa-microphone"></i> Recording...');
                $('#stop_wrapper').prop('disabled', false);
            })
            .catch(error => {
                console.error('Error accessing microphone:', error);
                alert('Unable to access microphone. Please ensure microphone permissions are granted.');
                isRecording = false;
            });
    });

    $('#stop_wrapper').click(function() {
        if (!isRecording) return;
        
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
            mediaRecorder.stop();
            mediaRecorder.stream.getTracks().forEach(track => track.stop());
            
            // 更新按钮状态
            $(this).prop('disabled', true);
            $('#record_wrapper').prop('disabled', false)
                // .html('<i class="fas fa-microphone"></i> Start Recording'); // 恢复按钮文本
            
            // 保存录音文件
            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                const fileName = generateRandomFileName('.wav');
                
                const formData = new FormData();
                formData.append('audio', audioBlob, fileName);
                
                fetch('/save-audio', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    console.log('Audio saved:', data);
                    
                    $('#audio-preview').show();
                    $('#audio-player').attr('src', `/tmp/${fileName}`);
                    $('#file-name').text(fileName);
                    $('#delete-audio').show();
                    
                    isRecording = false; // 重置录音状态
                })
                .catch(error => {
                    console.error('Error saving audio:', error);
                    alert('Failed to save audio file');
                    isRecording = false; // 确保在错误情况下也重置状态
                });
            };
        }
    });

    // 处理音频文件上传
    $('#audio-file-input').change(function(e) {
        const file = e.target.files[0];
        if (file) {
            const extension = file.name.substring(file.name.lastIndexOf('.'));
            const newFileName = generateRandomFileName(extension);
            
            const formData = new FormData();
            formData.append('audio', file, newFileName);
            
            fetch('/save-audio', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                console.log('File saved:', data);
                
                // 修改这里的路径
                $('#audio-preview').show();
                $('#audio-player').attr('src', `/tmp/${newFileName}`);
                $('#file-name').text(newFileName);
                $('#delete-audio').show();
            })
            .catch(error => {
                console.error('Error saving file:', error);
                alert('Failed to save audio file');
            });
        }
    });

    // 处理删除音频
    $('#delete-audio').click(function() {
        const fileName = $('#file-name').text();
        if (fileName) {
            fetch('/delete-audio', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ fileName: fileName })
            })
            .then(response => response.json())
            .then(data => {
                console.log('File deleted:', data);

                // 清除音频预览
                $('#audio-preview').hide();
                $('#audio-player').attr('src', '');
                $('#audio-file-input').val('');
                $('#delete-audio').hide();
                audioChunks = [];
            })
            .catch(error => {
                console.error('Error deleting file:', error);
                alert('Failed to delete audio file');
            });
        }
    });
    
</script>
