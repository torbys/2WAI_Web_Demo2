<script>
	/*max滑块的更改*/
	document.getElementById('chunk-size').addEventListener('input', function(e) {
	   var value = e.target.value;
	   var numberBoxContainer = document.querySelector('.number-box-container');
	   
	   // 确保.number-box-container是可见的
	   numberBoxContainer.style.display = 'block'; // 或者 'inline-block', 'flex' 等，取决于你的布局需求
	   
	   var sliderWidth = e.target.offsetWidth;
	   var numberBoxLeft = (value / e.target.max) * (sliderWidth - 100) + 'px';
	   
	   numberBoxContainer.style.left = numberBoxLeft;
	   
	   // 清除之前的定时器
	   if (numberBoxContainer.timeoutId) {
	     clearTimeout(numberBoxContainer.timeoutId);
	   }
	   
	   // 设置一个短暂的延迟，然后隐藏.number-box-container
	   numberBoxContainer.timeoutId = setTimeout(function() {
	     numberBoxContainer.style.display = 'none';
	   }, 500); // 1000毫秒后隐藏，可以根据需要调整这个时间
	});
</script>

	function changeImage() {
		console.log("yes");
		
	    // 获取图片元素
	    var image = document.getElementById('voice-image');
		
		voiceFlag=!voiceFlag;
	    var newSrc =voiceFlag? './icon/voice.png' : './icon/left.png'; // 根据 voiceFlag 的值选择图片
	
	    // 添加过渡效果
	    image.classList.add('changing');
	
	    // 移除过渡效果类，这将在 CSS 中触发过渡
	    setTimeout(function() {
			// 设置图片新源
			image.src = newSrc;
	        image.classList.remove('changing');
	    }, 300); // 300毫秒后移除，与 CSS 中的过渡时间相匹配
		
		var message = document.getElementById('message');
		var recordGroup = document.getElementById('recordGroup');
		var voiceImage = document.getElementById('voice-image');
	
		// 切换显示状态
		if (message.classList.contains('hidden')) {
		    message.classList.remove('hidden');
		    recordGroup.classList.add('hidden');
		} else {
		    message.classList.add('hidden');
		    recordGroup.classList.remove('hidden');
		}
		
		var recordWrapper = document.getElementById('record_wrapper');
		var stopWrapper = document.getElementById('stop_wrapper');
		var activeLine = document.getElementById('activeLine');
			
		recordWrapper.addEventListener('click', function() {

		    } else {
		        recordWrapper.classList.add('show');
		        stopWrapper.classList.remove('show');
		        activeLine.classList.remove('show');
		    }
		});
		
	}

<script>
    // 添加视频高度监听和聊天容器高度整功能
    function adjustChatContainerHeight() {
        const video = document.querySelector('#video');
        const chatContainer = document.querySelector('.chat-container');
        const form = document.querySelector('#echo-form'); // 确保你的表单有一个ID
    
        if (video && chatContainer && form) {
            const videoHeight = video.offsetHeight;
            const formHeight = form.offsetHeight;
            const adjustedHeight = videoHeight - formHeight-50px;
    
            if (adjustedHeight > 0) {
                chatContainer.style.height = `${adjustedHeight}px`;
                chatContainer.style.minHeight = `${adjustedHeight}px`;
                chatContainer.style.maxHeight = `${videoHeight}px`; // 你可以根据需要调整最大高度
            } else {
                // 如果计算出的高度小于或等于0，你可以设置一个最小高度或者直接使用视频的高度
                chatContainer.style.height = `${videoHeight}px`;
                chatContainer.style.minHeight = `${videoHeight}px`;
                chatContainer.style.maxHeight = `${videoHeight}px`;
            }
        }
    }
    
    // 监听视频加载事件
    document.querySelector('#video').addEventListener('loadedmetadata', () => {
        setTimeout(adjustChatContainerHeight, 100); // 迟一点执行以确保视频尺寸已更新
    });
    
    // 创建 ResizeObserver 来监听视频尺寸变化
    const resizeObserver = new ResizeObserver(entries => {
        adjustChatContainerHeight();
    });
    
    // 开始观察视频元素
    resizeObserver.observe(document.querySelector('#video'));
    
    // 监听窗口大小变化
    window.addEventListener('resize', adjustChatContainerHeight);
    
    // 定期检查视频高度（以防其他情况导致的变化）
    setInterval(adjustChatContainerHeight, 1000);
    
</script>
<script>
     let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;  // 添加录音状态标志

    $('#btn_start_record').click(function() {
        if (isRecording) return;
        
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };
                
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    
                    $('#audio-preview').show();
                    $('#audio-player').attr('src', audioUrl);
                    $('#file-name').text('Recorded Audio');
                    $('#delete-audio').show();
                    
                    isRecording = false;
                    // 恢复按钮文本
                    $(this).html('<i class="fas fa-microphone"></i> Start Recording');
                };
                
                mediaRecorder.start();
                audioChunks = [];
                isRecording = true;
                
                // 更新按钮状态和文本
                $(this).prop('disabled', true);
                $(this).html('<i class="fas fa-microphone"></i> Recording...');
                $('#btn_stop_record').prop('disabled', false);
            })
            .catch(error => {
                console.error('Error accessing microphone:', error);
                alert('Unable to access microphone. Please ensure microphone permissions are granted.');
                isRecording = false;
            });
    });

    $('#btn_stop_record').click(function() {
        if (!isRecording) return;
        
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
            mediaRecorder.stop();
            mediaRecorder.stream.getTracks().forEach(track => track.stop());
            
            // 更新按钮状态
            $(this).prop('disabled', true);
            $('#btn_start_record').prop('disabled', false)
                .html('<i class="fas fa-microphone"></i> Start Recording'); // 恢复按钮文本
            
            // 保存录音文件
            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                const fileName = generateRandomFileName('.wav');
                
                const formData = new FormData();
                formData.append('audio', audioBlob, fileName);
                
                fetch('/save-audio', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    console.log('Audio saved:', data);
                    
                    $('#audio-preview').show();
                    $('#audio-player').attr('src', `/tmp/${fileName}`);
                    $('#file-name').text(fileName);
                    $('#delete-audio').show();
                    
                    isRecording = false; // 重置录音状态
                })
                .catch(error => {
                    console.error('Error saving audio:', error);
                    alert('Failed to save audio file');
                    isRecording = false; // 确保在错误情况下也重置状态
                });
            };
        }
    });

    // 处理音频文件上传
    $('#audio-file-input').change(function(e) {
        const file = e.target.files[0];
        if (file) {
            const extension = file.name.substring(file.name.lastIndexOf('.'));
            const newFileName = generateRandomFileName(extension);
            
            const formData = new FormData();
            formData.append('audio', file, newFileName);
            
            fetch('/save-audio', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                console.log('File saved:', data);
                
                // 修改这里的路径
                $('#audio-preview').show();
                $('#audio-player').attr('src', `/tmp/${newFileName}`);
                $('#file-name').text(newFileName);
                $('#delete-audio').show();
            })
            .catch(error => {
                console.error('Error saving file:', error);
                alert('Failed to save audio file');
            });
        }
    });

    // 处理删除音频
    $('#delete-audio').click(function() {
        const fileName = $('#file-name').text();
        if (fileName) {
            fetch('/delete-audio', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ fileName: fileName })
            })
            .then(response => response.json())
            .then(data => {
                console.log('File deleted:', data);

                // 清除音频预览
                $('#audio-preview').hide();
                $('#audio-player').attr('src', '');
                $('#audio-file-input').val('');
                $('#delete-audio').hide();
                audioChunks = [];
            })
            .catch(error => {
                console.error('Error deleting file:', error);
                alert('Failed to delete audio file');
            });
        }
    });
    
</script>


</html>
